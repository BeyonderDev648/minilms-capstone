name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # A placeholder is fine here - this step only verifies the build
          # compiles successfully, it doesn't need a live backend.
          VITE_API_URL: https://placeholder.example.com/api

# Actual deployment is handled by Vercel/Netlify's own GitHub integration,
# which auto-deploys whenever this branch updates and this workflow passes.
