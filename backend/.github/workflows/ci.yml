name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check syntax of all source files
        run: find src -name "*.js" -print0 | xargs -0 -n1 node --check

      - name: Smoke test - server boots and responds to /health
        run: |
          (DATABASE_URL=postgres://fake:fake@localhost:5432/fake \
           JWT_SECRET=ci-test-secret \
           CORS_ORIGIN=http://localhost:5173 \
           PORT=5050 \
           node src/server.js &)
          sleep 2
          curl --fail http://localhost:5050/health

# Deployment itself (Render/Railway) is handled by that platform's own
# GitHub integration - it auto-deploys whenever this branch updates and
# this workflow passes. That keeps this file focused on "is the code sound"
# rather than re-implementing deploy logic the hosting platform already does.
